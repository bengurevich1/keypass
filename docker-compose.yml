services:
  api:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://keypass:${DB_PASSWORD:-keypass123}@db:5432/keypass
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN:-}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID:-}
      - WHATSAPP_TEMPLATE_NAME=${WHATSAPP_TEMPLATE_NAME:-}
      - WHATSAPP_TEMPLATE_LANG=${WHATSAPP_TEMPLATE_LANG:-he}
      - WHATSAPP_TEMPLATE_PARAMS=${WHATSAPP_TEMPLATE_PARAMS:-3}
      - JWT_SECRET=${JWT_SECRET:-keypass-jwt-secret-dev}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-keypass-jwt-refresh-secret-dev}
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-admin@keypass.co.il}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-admin123456}
      - DEV_MODE=${DEV_MODE:-true}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "5173:80"
    depends_on:
      - api

  super-dashboard:
    build: ./super-dashboard
    ports:
      - "5174:80"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=keypass
      - POSTGRES_PASSWORD=${DB_PASSWORD:-keypass123}
      - POSTGRES_DB=keypass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keypass"]
      interval: 5s
      timeout: 5s
      retries: 5

  landing:
    build: ./landing
    ports:
      - "80:80"
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqttdata:/mosquitto/data

volumes:
  pgdata:
  mqttdata:
